<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get a Quote | Valley Mix Concrete</title><link rel="stylesheet" href="/style.css"></head><body>
<header class="topbar">
  <div class="container wrap">
    <a class="brand" href="/"><img src="/logo.jpg" alt="Valley Mix Concrete"></a>
    <nav class="nav">
      <a href="/about.html">Who We Are</a>
      <a href="/#services">Products &amp; Services</a>
      <a href="/projects.html">Projects</a>
      <a class="btn" href="/quote.html">Get a Quote</a>
      <div class="lang">
        <a href="?lang=en" class="pill active">EN</a>
        <a href="?lang=es" class="pill">ES</a>
      </div>
    </nav>
  </div>
</header>
<main class="section"><div class="container panel">
  <h1>Get a Quote</h1>
  <form method="POST" action="https://formspree.io/f/xanpllbr">
    <input type="hidden" name="_redirect" value="/thank-you.html">
    <p><label>Name<br><input name="name" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px"></label></p>
    <p><label>Phone<br><input name="phone" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px"></label></p>
    <p><label>Email<br><input type="email" name="email" required style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px"></label></p>
    <p><label>PSI<br><select name="psi" style="width:100%;padding:10px;border:1px solid #e5e7eb;border-radius:10px">
      <option>2500</option><option>3000</option><option>3500</option><option>4000</option><option>4500</option></select></label></p>
    <p><button class="btn" type="submit">Send Request</button></p>
  </form>
</div></main>
</body></html>
