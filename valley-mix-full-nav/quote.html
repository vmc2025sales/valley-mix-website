<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get a Quote | Valley Mix Concrete</title><link rel="stylesheet" href="/style.css"></head><body>
<header class="topbar"><div class="container wrap">
  <a class="brand" href="/"><img src="/logo.jpg" alt="Valley Mix Concrete"></a>
  <nav class="nav">
    <a href="/about.html">Who We Are</a>
    <a href="/#services">Products &amp; Services</a>
    <a href="/projects.html">Projects</a>
    <a class="btn" href="/quote.html">Get a Quote</a>
    <div class="lang"><a class="pill active" href="?lang=en">EN</a><a class="pill" href="?lang=es">ES</a></div>
  </nav>
</div></header>

<main class="section"><div class="container panel">
  <h1>Get a Quote</h1>
  <form method="POST" action="https://formspree.io/f/xanpllbr" class="grid-2">
    <input type="hidden" name="_redirect" value="/thank-you.html">
    <div><label>Name<br><input name="name" required style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></label></div>
    <div><label>Phone<br><input name="phone" required style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></label></div>
    <div><label>Email<br><input type="email" name="email" required style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></label></div>
    <div><label>Address/City<br><input name="address" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></label></div>
    <div><label>PSI<br><select name="psi" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"><option>2500</option><option>3000</option><option>3500</option><option>4000</option><option>4500</option></select></label></div>
    <div><label>Yards (approx.)<br><input name="yards" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></label></div>
    <div style="grid-column:1/-1"><label>Notes<br><textarea name="message" rows="4" style="width:100%;padding:10px;border:1px solid var(--line);border-radius:10px"></textarea></label></div>
    <div style="grid-column:1/-1"><button class="btn" type="submit">Send Request</button></div>
  </form>
</div></main>

</body></html>
