<section class="section"><div class="container panel">
  <h2 data-i="form_h">Tell Us About Your Pour</h2>
  <div id="notice" style="margin:10px 0;color:#065f46;"></div>
  <form id="quote-form" class="grid-2">
    <input type="text" name="name" placeholder="Name" data-i="form_name" required>
    <input type="email" name="email" placeholder="Email" data-i="form_email" required>
    <select name="psi" required>
      <option value="" disabled selected>PSI</option>
      <option>2500</option><option>3000</option><option>3500</option><option>4000</option><option>4500</option>
    </select>
    <textarea name="message" rows="6" placeholder="Details (address, date/time)" data-i="form_msg"></textarea>
    <button class="btn" type="submit" data-i="form_send">Send Request</button>
  </form>
</div></section>
