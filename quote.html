<section class="section">

  <form id="quote-form" class="form">
    <label for="psi" data-i="form_psi_label">PSI</label>
    <select id="psi" name="psi" required aria-label="PSI">
      <option value="" disabled selected>PSI</option>
      <option value="2500">2500 PSI</option>
      <option value="3000">3000 PSI</option>
      <option value="3500">3500 PSI</option>

    <input type="email" name="email" placeholder="Email" data-i="form_email" required>
    <textarea name="message" rows="6" placeholder="Details (address, date/time)" data-i="form_msg"></textarea>
    <button class="btn" type="submit" data-i="form_send">Send Request</button>
  </form>
